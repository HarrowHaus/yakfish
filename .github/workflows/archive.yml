name: Archive headline records

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run archive:news
      - name: Commit updated archive
        run: |
          git config user.name "yakfish-bot"
          git config user.email "yakfish-bot@users.noreply.github.com"
          git add public/cache/latest.json public/cache/news.json public/cache/archive-manifest.json public/archive
          git diff --cached --quiet || git commit -m "build: refresh wire (latest.json + archive)"
          git push
